name: Build EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install pyinstaller

    - name: Build EXE
      run: pyinstaller --onefile --noconsole midi_chord_generator.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: midi_exe
        path: dist/midi_chord_generator.exe
